<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To My Dearest Rowida ❤️</title>
    <!-- Load Tailwind CSS for utility classes like font-inter and responsiveness -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom font import (Inter is clear and elegant) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
        
        :root {
            /* Define romantic color palette */
            --pink-soft: #FFB6C1;
            --peach-light: #FFDAB9;
            --red-romantic: #FF6B6B;
            --white-glow: #FFFFFF;
        }

        body {
            /* Warm Gradient Background */
            background: linear-gradient(135deg, var(--peach-light) 0%, var(--pink-soft) 50%, var(--red-romantic) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Hide anything that flows outside the viewport */
            font-family: 'Inter', sans-serif;
            position: relative;
        }

        /* --- Custom Animations --- */

        /* 1. Heartbeat Animation for the Name */
        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05); /* Slight enlargement */
                filter: brightness(1.2); /* Subtle flash */
            }
        }

        /* 2. Floating Animation (for hearts, petals, bubbles) */
        @keyframes float-up {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        /* 3. Twinkle/Glow Effect for Stars/Sparkles */
        @keyframes twinkle {
            0%, 100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* --- Element Styles --- */
        
        .romantic-container {
            position: relative;
            z-index: 10; /* Ensures content is above all background elements */
            text-align: center;
            padding: 20px;
            max-width: 90%;
            border-radius: 20px;
            /* Subtle soft background card effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        #rowida-name {
            font-size: 4rem;
            font-weight: 900;
            color: var(--white-glow);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 182, 193, 0.7);
            cursor: pointer;
            transition: transform 0.3s ease, text-shadow 0.3s ease;
            display: inline-block;
            line-height: 1; /* Keep it tight */
            /* Apply the continuous heartbeat */
            animation: heartbeat 1.5s infinite alternate;
        }

        @media (min-width: 768px) {
            #rowida-name {
                font-size: 8rem; /* Larger on desktop */
            }
        }

        #romantic-sentence {
            margin-top: 1rem;
            font-size: 1.5rem;
            color: var(--white-glow);
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, text-shadow 0.3s ease;
            cursor: pointer;
        }

        /* Hover Interactions */
        .interactive-text:hover {
            transform: scale(1.03);
            text-shadow: 0 0 15px var(--white-glow), 0 0 30px var(--red-romantic);
        }

        /* --- Background Element Styling --- */

        .particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Crucial: allows clicking on content below */
            z-index: 5;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            user-select: none;
            animation: float-up 15s infinite ease-in;
            opacity: 0;
            color: var(--white-glow);
        }
        
        .sparkle {
            animation: twinkle 2s infinite alternate;
        }

    </style>
</head>
<body>

    <!-- Container for continuously generated background elements -->
    <div id="particle-bg-container" class="particle-container"></div>

    <!-- Container for mouse-trail elements -->
    <div id="mouse-trail-container" class="particle-container"></div>

    <!-- Main Content -->
    <div class="romantic-container">
        <h1 id="rowida-name" class="interactive-text">Rowida</h1>
        <p id="romantic-sentence" class="interactive-text">
            Every moment with you feels like magic, and I can’t stop falling for you all over again ✨❤️
        </p>
    </div>

    <script>
        // Global State and Constants
        const BG_CONTAINER = document.getElementById('particle-bg-container');
        const TRAIL_CONTAINER = document.getElementById('mouse-trail-container');
        const NAME_ELEMENT = document.getElementById('rowida-name');
        const SENTENCE_ELEMENT = document.getElementById('romantic-sentence');
        const PARTICLE_TYPES = ['❤️', '✨', '⭐', '🌸', '💖', '💎', '🫧'];
        const BACKGROUND_GENERATION_RATE_MS = 300; // Generate a particle every 300ms
        const MAX_TRAIL_PARTICLES = 50;

        /**
         * Utility function to generate a random number within a range.
         */
        const randomRange = (min, max) => Math.random() * (max - min) + min;

        /**
         * Creates a single animated particle element.
         * @param {string} content - The emoji/text content of the particle.
         * @param {number} size - The font size in pixels.
         * @param {number} duration - The animation duration in seconds.
         * @param {number} startX - The starting X position (0-100vw).
         * @param {number} delay - The animation delay in seconds.
         * @returns {HTMLElement} The created particle element.
         */
        function createParticle(content, size, duration, startX, delay) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.innerHTML = content;
            
            // Set styles for randomness
            particle.style.fontSize = `${size}px`;
            particle.style.animationDuration = `${duration}s`;
            particle.style.animationDelay = `-${delay}s`;
            
            // Set random starting X position 
            particle.style.left = `${startX}vw`;
            
            // Random opacity and rotation
            particle.style.opacity = randomRange(0.2, 0.8);
            particle.style.transform = `scale(${randomRange(0.5, 1.5)})`;
            
            // Add sparkle class to some elements
            if (content === '✨' || content === '⭐' || content === '💎') {
                particle.classList.add('sparkle');
                particle.style.color = '#fff'; // Ensure stars/sparkles are white
            } else if (content === '🌸') {
                 particle.style.color = '#FFDAB9'; // Peach color for petals
            }


            // Remove element after it finishes floating
            particle.addEventListener('animationend', () => particle.remove());

            return particle;
        }

        /**
         * Generates and appends a background particle.
         */
        function generateBackgroundParticle() {
            const content = PARTICLE_TYPES[Math.floor(Math.random() * PARTICLE_TYPES.length)];
            const size = randomRange(10, 30);
            const duration = randomRange(10, 25);
            const startX = randomRange(-10, 110);
            const delay = randomRange(0, 25); // Use a large max delay to stagger the initial view

            const particle = createParticle(content, size, duration, startX, delay);
            BG_CONTAINER.appendChild(particle);
            
            // Clean up: limit the number of particles to prevent excessive DOM elements
            if (BG_CONTAINER.children.length > 100) {
                BG_CONTAINER.firstChild.remove();
            }
        }
        
        /**
         * Creates a small temporary particle for the mouse trail effect.
         */
        function createTrailParticle(x, y) {
            const content = PARTICLE_TYPES[Math.floor(Math.random() * 3)]; // Hearts, Sparkles, Stars only for trail
            const size = randomRange(8, 18);
            
            const trailParticle = document.createElement('div');
            trailParticle.innerHTML = content;
            trailParticle.style.position = 'absolute';
            trailParticle.style.fontSize = `${size}px`;
            trailParticle.style.opacity = randomRange(0.5, 1);
            trailParticle.style.left = `${x}px`;
            trailParticle.style.top = `${y}px`;
            trailParticle.style.transition = 'opacity 1s ease-out, transform 1s ease-out';
            trailParticle.style.transform = `scale(1) rotate(${randomRange(0, 360)}deg)`;
            trailParticle.style.color = content === '❤️' ? 'var(--red-romantic)' : 'var(--white-glow)';
            trailParticle.classList.add('sparkle');
            
            TRAIL_CONTAINER.appendChild(trailParticle);

            // Animate and remove
            setTimeout(() => {
                // Fade out and shrink/move slightly
                trailParticle.style.opacity = '0';
                trailParticle.style.transform = `scale(0.1) translate(${randomRange(-20, 20)}px, ${randomRange(-20, 20)}px)`;
            }, 50);

            setTimeout(() => {
                trailParticle.remove();
            }, 1000);
            
             // Clean up: limit trail particles
            if (TRAIL_CONTAINER.children.length > MAX_TRAIL_PARTICLES) {
                TRAIL_CONTAINER.firstChild.remove();
            }
        }

        /**
         * Event listener for mouse movement to create the trail effect.
         */
        document.addEventListener('mousemove', (e) => {
            // Only generate a particle every few pixels moved for performance
            if (Math.random() < 0.2) {
                createTrailParticle(e.clientX, e.clientY);
            }
        });
        
        /**
         * Initialize all continuous background generation.
         */
        function initBackgroundGeneration() {
             // 1. Initial burst to fill the screen quickly
            for(let i = 0; i < 50; i++) {
                generateBackgroundParticle();
            }

            // 2. Continuous generation loop
            setInterval(generateBackgroundParticle, BACKGROUND_GENERATION_RATE_MS);
            
            // The particles will continue floating and be removed by their 'animationend' listener.
        }

        // Wait for the window to load before starting animations
        window.onload = initBackgroundGeneration;

    </script>
</body>
</html>
